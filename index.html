<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>B'Here</title>

    <!-- Preview WhatsApp/Facebook -->
    <meta name="description" content="Platform Digital B'Here">
    <meta property="og:title" content="B'Here">
    <meta property="og:description" content="Platform Digital B'Here">
    <meta property="og:type" content="website">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(135deg,#1976D2,#42A5F5);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:420px;
            background:white;
            border-radius:20px;
            padding:40px;
            text-align:center;
            box-shadow:0 15px 35px rgba(0,0,0,.2);
        }

        h1{
            color:#1976D2;
            margin-bottom:20px;
            font-size:40px;
        }

        p{
            color:#555;
            line-height:1.7;
            margin-bottom:15px;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            background:#1976D2;
            color:white;
            text-decoration:none;
            padding:15px 35px;
            border-radius:10px;
            font-size:18px;
            transition:.3s;
        }

        .btn:hover{
            background:#125aa0;
        }

        .footer{
            margin-top:35px;
            color:#999;
            font-size:13px;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>B'Here</h1>

    <p>
        Selamat datang di platform digital B'Here.
    </p>

    <p>
        Klik tombol di bawah untuk mulai menggunakan aplikasi.
    </p>

    <a class="btn"
       href="https://bit.ly/BHeregen1">
        🚀 Mulai Sekarang
    </a>

    <div class="footer">
        © 2026 B'Here
    </div>

</div>

</body>
</html>
